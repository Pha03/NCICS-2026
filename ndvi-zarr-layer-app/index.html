<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVHRR NDVI CDR — Multiscale Viewer</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Menlo', 'Monaco', monospace;
        background: #1b1e23;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 10px 16px;
        background: #12151a;
        border-bottom: 1px solid #2e3440;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: #e0e0e0;
      }

      header span {
        font-size: 14px;
        color: #6c7a8c;
      }

      #status {
        font-size: 14px;
        color: #f0a500;
        margin-left: auto;
      }

      #status.ready { color: #4caf6e; }
      #status.error { color: #e05c5c; }

      main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #map { flex: 1; }

      aside {
        width: 220px;
        background: #12151a;
        border-left: 1px solid #2e3440;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .control-group label {
        display: block;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6c7a8c;
        margin-bottom: 6px;
      }

      .control-group select,
      .control-group input[type="range"] {
        width: 100%;
      }

      .control-group input[type="range"] {
        accent-color: #4caf6e;
      }

      .clim-row {
        display: flex;
        gap: 6px;
      }

      .clim-row input[type="number"] {
        width: 50%;
        background: #1e222a;
        border: 1px solid #2e3440;
        color: #e0e0e0;
        padding: 4px 6px;
        font-size: 13px;
        font-family: inherit;
        border-radius: 3px;
      }

      select {
        background: #1e222a;
        border: 1px solid #2e3440;
        color: #e0e0e0;
        padding: 4px 6px;
        font-size: 13px;
        font-family: inherit;
        border-radius: 3px;
        cursor: pointer;
      }

      .value-display {
        font-size: 13px;
        color: #8899aa;
        margin-top: 4px;
        text-align: right;
      }

      .divider {
        border: none;
        border-top: 1px solid #2e3440;
      }

      .meta {
        font-size: 13px;
        color: #4a5568;
        line-height: 1.5;
      }

      .meta strong { color: #6c7a8c; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>AVHRR NDVI CDR</h1>
      <span>GeoZarr multiscale · Icechunk on R2</span>
      <span id="zoom-display">zoom: —</span>
      <span id="status">connecting…</span>
    </header>

    <main>
      <div id="map"></div>

      <aside>
        <div class="control-group">
          <label>Time step</label>
          <input type="range" id="time-slider" min="0" max="4" step="1" value="0" />
          <div class="value-display" id="time-label">2000-01-01</div>
        </div>

        <div class="control-group">
          <label>Colormap</label>
          <select id="colormap-select">
            <option value="ylgn" selected>YlGn</option>
            <option value="rdylgn">RdYlGn</option>
            <option value="viridis">Viridis</option>
            <option value="plasma">Plasma</option>
            <option value="greens">Greens</option>
          </select>
        </div>

        <div class="control-group">
          <label>NDVI range</label>
          <div class="clim-row">
            <input type="number" id="clim-min" value="-0.1" step="0.05" />
            <input type="number" id="clim-max" value="1.0" step="0.05" />
          </div>
        </div>

        <div class="control-group">
          <label>Opacity</label>
          <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.85" />
          <div class="value-display" id="opacity-label">0.85</div>
        </div>

        <hr class="divider" />

        <div class="meta">
          <strong>Source</strong><br />
          NOAA CDR AVHRR NDVI v5<br />
          Jan 1–5, 2000<br />
          0.05° global<br /><br />
          <strong>Store</strong><br />
          osc-pub/ndvi-cdr-pyramid<br />
          Cloudflare R2<br />
          GeoZarr multiscales
        </div>
      </aside>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
